<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produk - Nusantara Mart</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        background-color: #e9eef3;
      }

      .hero-title {
        background: linear-gradient(to bottom, #b30000 50%, #ffffff 50%);
        text-align: center;
        padding: 60px 20px;
      }

      .hero-title h2 {
        font-family: "Georgia", serif;
        font-weight: bold;
        font-size: 40px;
        color: white;
        text-shadow: 2px 2px 6px black;
        display: inline-block;
      }

      .hero-title h2::after {
        content: "";
        display: block;
        width: 150px;
        height: 3px;
        background: gold;
        margin: 15px auto;
      }

      .card {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        transition: all 0.3s ease;
        background: linear-gradient(to bottom, #ffffff, #f8f9fa);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }

      .card img {
        height: 200px;
        width: 100%;
        object-fit: cover;
        transition: 0.3s;
        border-bottom: 1px solid #eee;
      }

      .card:hover img {
        transform: scale(1.05);
      }

      .card-body {
        text-align: center;
      }

      .card-body h6 {
        font-weight: 600;
        font-size: 16px;
        margin-bottom: 5px;
      }

      .price {
        color: #b30000;
        font-weight: bold;
        font-size: 15px;
      }

      .btn-dark {
        border-radius: 20px;
        padding: 5px 15px;
        transition: 0.3s;
      }

      .btn-dark:hover {
        background-color: #b30000;
        border-color: #b30000;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .card img {
        height: 200px;
        object-fit: cover;
      }

      .price {
        color: #b30000;
        font-weight: bold;
      }

      .section-title {
        border-left: 5px solid #b30000;
        padding-left: 10px;
        margin: 30px 0 15px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <!-- ===== HERO ===== -->
    <div class="hero-title">
      <h2>Produk Nusantara</h2>
    </div>
    <div class="container mt-4">
    <!-- ===== MAKANAN ===== -->
      <h4 class="section-title">🍽️ Produk Makanan</h4>
      <div class="row">
        <!-- Makanan -->
        <script>
          const makanan = [
            ["Kopi Gayo Aceh", "21.jpeg", "kopi-gayo", "40.000"],
            ["Kopi Toraja", "22.jpeg", "kopi-toraja", "60.000"],
            ["Keripik Tempe", "23.jpeg", "keripik-tempe", "10.000"],
            ["Dodol Garut", "24.jpeg", "dodol-garut", "15.000"],
            ["Rendang Kemasan", "25.jpeg", "rendang", "35.000"],
            ["Sambal Roa", "26.jpeg", "sambal-roa", "25.000"],
            ["Kacang Tanah Goreng", "27.jpeg", "kacang", "15.000"],
            ["Kue Bawang Padang", "28.jpeg", "kue-bawang", "20.000"],
            ["Gudeg Kaleng Jogja", "29.jpeg", "gudeg", "30.000"],
            ["Pempek", "30.jpeg", "pempek", "60.000"],
            ["Kue Lapis Legit", "31.jpeg", "lapis", "65.000"],
            ["Kue Bika Ambon", "32.jpeg", "bika", "40.000"],
          ];

          document.write(
            makanan
              .map(
                (p) => `
        <div class="col-6 col-md-4 col-lg-3 mb-4">
          <div class="card">
            <img src="${p[1]}" class="card-img-top">
            <div class="card-body text-center">
              <h6>${p[0]}</h6>
              <p class="price">Rp ${p[3]}</p>
              <a href="product-detail.html#${p[2]}" class="btn btn-dark btn-sm">Detail</a>
            </div>
          </div>
        </div>
      `,
              )
              .join(""),
          );
        </script>
      </div>

      <!-- ===== KERAJINAN ===== -->
      <h4 class="section-title">🧵 Produk Kerajinan</h4>
      <div class="row">
        <script>
          const kerajinan = [
            ["Kain Tenun", "1.jpeg", "tenun", "160.000"],
            ["Kain Ulos", "2.jpeg", "ulos", "400.000"],
            ["Ukiran Kayu Jepara", "3.jpeg", "ukiran-jepara", "200.000"],
            ["Keramik Gerabah", "4.jpeg", "gerabah", "50.000"],
            ["Topeng Kayu Khas Bali", "5.jpeg", "topeng-bali", "200.000"],
            ["Wayang Kulit", "6.jpeg", "wayang", "250.000"],
            ["Batik Pekalongan", "7.jpeg", "batik-pekalongan", "75.000"],
            ["Songket Palembang", "8.jpeg", "songket", "500.000"],
            ["Tas Rotan", "9.jpeg", "tas-rotan", "50.000"],
            ["Kerajinan Manik-Manik", "10.jpeg", "manik", "20.000"],
            ["Tas Daur Ulang", "11.jpeg", "tas-daur-ulang", "80.000"],
            ["Batik Khas Surakarta", "12.jpeg", "batik-solo", "350.000"],
          ];

          document.write(
            kerajinan
              .map(
                (p) => `
        <div class="col-6 col-md-4 col-lg-3 mb-4">
          <div class="card">
            <img src="${p[1]}" class="card-img-top">
            <div class="card-body text-center">
              <h6>${p[0]}</h6>
              <p class="price">Rp ${p[3]}</p>
              <a href="product-detail.html#${p[2]}" class="btn btn-dark btn-sm">Detail</a>
            </div>
          </div>
        </div>
      `,
              )
              .join(""),
          );
        </script>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan - Nusantara Mart</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      min-height: 100vh;
      background: linear-gradient(to bottom, #1f1f1f, #2c2c2c);
      color: white;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: #ccc;
      padding: 10px;
      text-decoration: none;
      border-radius: 10px;
    }

    .sidebar a:hover {
      background: #b30000;
      color: white;
    }

    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .table-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .btn-custom {
      background: #b30000;
      color: white;
      border-radius: 20px;
    }

    .btn-custom:hover {
      background: #800000;
    }

    .status {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: white;
    }

    .proses { background: orange; }
    .dikirim { background: blue; }
    .selesai { background: green; }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">
      <h4>Nusantara Mart</h4>
      <a href="admin.html">Dashboard</a>
      <a href="products.html">Produk</a>
      <a href="pesanan.html">Pesanan</a>
      <a href="index.html">Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="col-md-10 p-4">

      <div class="header">
        <h5>Data Pesanan</h5>
      </div>

      <!-- TABEL PESANAN -->
      <div class="table-box">
        <h5>Daftar Pesanan Masuk</h5>

        <table class="table table-striped mt-3">
          <thead class="table-dark">
            <tr>
              <th>Nama Pelanggan</th>
              <th>Produk</th>
              <th>Total</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tabelPesanan">
            <tr>
              <td>Surya Aji Saputra</td>
              <td>Kopi Gayo Aceh</td>
              <td>40.000</td>
              <td><span class="status proses">Diproses</span></td>
              <td><button class="btn btn-danger btn-sm">Hapus</button></td>
            </tr>

            <tr>
              <td>Sheillo Valentino</td>
              <td>Batik Pekalongan</td>
              <td>75.000</td>
              <td><span class="status dikirim">Dikirim</span></td>
              <td><button class="btn btn-danger btn-sm">Hapus</button></td>
            </tr>

            <tr>
              <td>Rafel Margeafany</td>
              <td>Songket Palembang</td>
              <td>500.000</td>
              <td><span class="status selesai">Selesai</span></td>
              <td><button class="btn btn-danger btn-sm">Hapus</button></td>
            </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>
</div>

<script>
  document.querySelectorAll(".btn-danger").forEach(btn => {
    btn.addEventListener("click", function () {
      this.closest("tr").remove();
    });
  });
</script>

</body>
</html>

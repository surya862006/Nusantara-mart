<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Nusantara Mart</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      min-height: 100vh;
      background: linear-gradient(to bottom, #1f1f1f, #2c2c2c);
      color: white;
      padding: 20px;
    }

    .sidebar a {
      display: block;
      color: #ccc;
      padding: 10px;
      text-decoration: none;
      border-radius: 10px;
    }

    .sidebar a:hover {
      background: #b30000;
      color: white;
    }

    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .form-box, .table-box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .btn-custom {
      background: #b30000;
      color: white;
      border-radius: 20px;
    }

    .btn-custom:hover {
      background: #800000;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">
      <h4>Nusantara Mart</h4>
      <a href="#">Dashboard</a>
      <a href="products.html">Produk</a>
      <a href="pesanan.html">Pesanan</a>
      <a href="index.html">Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="col-md-10 p-4">

      <div class="header">
        <h5>Dashboard Admin</h5>
      </div>

      <!-- FORM -->
      <div class="form-box">
        <h5>Tambah Produk</h5>

        <form id="productForm">
          <input type="text" id="nama" class="form-control mb-2" placeholder="Nama Produk" required>
          <input type="text" id="harga" class="form-control mb-2" placeholder="Harga" required>

          <select id="kategori" class="form-control mb-2">
            <option>Makanan</option>
            <option>Kerajinan</option>
          </select>

          <button type="submit" class="btn btn-custom">Tambah Produk</button>
        </form>
      </div>

      <!-- TABEL -->
      <div class="table-box">
        <h5>Daftar Produk</h5>

        <table class="table table-striped mt-3">
          <thead class="table-dark">
            <tr>
              <th>Nama</th>
              <th>Harga</th>
              <th>Kategori</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tabelProduk">
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPT -->
<script>
  const makanan = [
    ["Kopi Gayo Aceh", "21.jpeg", "kopi-gayo", "40.000"],
    ["Kopi Toraja", "22.jpeg", "kopi-toraja", "60.000"],
    ["Keripik Tempe", "23.jpeg", "keripik-tempe", "10.000"],
    ["Dodol Garut", "24.jpeg", "dodol-garut", "15.000"],
    ["Rendang Kemasan", "25.jpeg", "rendang", "35.000"],
    ["Sambal Roa", "26.jpeg", "sambal-roa", "25.000"],
    ["Kacang Tanah Goreng", "27.jpeg", "kacang", "15.000"],
    ["Kue Bawang Padang", "28.jpeg", "kue-bawang", "20.000"],
    ["Gudeg Kaleng Jogja", "29.jpeg", "gudeg", "30.000"],
    ["Pempek", "30.jpeg", "pempek", "60.000"],
    ["Kue Lapis Legit", "31.jpeg", "lapis", "65.000"],
    ["Kue Bika Ambon", "32.jpeg", "bika", "40.000"],
  ];

  const kerajinan = [
    ["Kain Tenun", "1.jpeg", "tenun", "160.000"],
    ["Kain Ulos", "2.jpeg", "ulos", "400.000"],
    ["Ukiran Kayu Jepara", "3.jpeg", "ukiran-jepara", "200.000"],
    ["Keramik Gerabah", "4.jpeg", "gerabah", "50.000"],
    ["Topeng Kayu Khas Bali", "5.jpeg", "topeng-bali", "200.000"],
    ["Wayang Kulit", "6.jpeg", "wayang", "250.000"],
    ["Batik Pekalongan", "7.jpeg", "batik-pekalongan", "75.000"],
    ["Songket Palembang", "8.jpeg", "songket", "500.000"],
    ["Tas Rotan", "9.jpeg", "tas-rotan", "50.000"],
    ["Kerajinan Manik-Manik", "10.jpeg", "manik", "20.000"],
    ["Tas Daur Ulang", "11.jpeg", "tas-daur-ulang", "80.000"],
    ["Batik Khas Surakarta", "12.jpeg", "batik-solo", "350.000"],
  ];

  const tabel = document.getElementById("tabelProduk");

  function tambahKeTabel(nama, harga, kategori) {
    const row = `
      <tr>
        <td>${nama}</td>
        <td>${harga}</td>
        <td>${kategori}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="hapus(this)">Hapus</button>
        </td>
      </tr>
    `;
    tabel.innerHTML += row;
  }

  // AUTO LOAD DATA AWAL
  makanan.forEach(item => {
    tambahKeTabel(item[0], item[3], "Makanan");
  });

  kerajinan.forEach(item => {
    tambahKeTabel(item[0], item[3], "Kerajinan");
  });

  // FORM TAMBAH PRODUK
  const form = document.getElementById("productForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const nama = document.getElementById("nama").value;
    const harga = document.getElementById("harga").value;
    const kategori = document.getElementById("kategori").value;

    tambahKeTabel(nama, harga, kategori);

    form.reset();
  });

  function hapus(btn) {
    btn.parentElement.parentElement.remove();
  }
</script>

</body>
</html>
